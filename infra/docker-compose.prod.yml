# ExploringToKnow — PRODUCTION compose.
# INFRA phase brings up ONLY postgres + caddy:
#   docker compose --env-file ../env/.env up -d postgres caddy
# APP phase (behind the `app` profile) builds + runs migrate, app, worker:
#   docker compose --env-file ../env/.env --profile app up -d --build
name: exploringtoknow

services:
  postgres:
    image: postgres:16
    container_name: etk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ../postgres-data:/var/lib/postgresql/data
    networks: [etk]
    expose: ["5432"]            # private to the compose network — NOT published to host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    container_name: etk-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [etk]

  # ---- APP PHASE (profile: app) -----------------------------------------
  migrate:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: build                     # build stage has source + pnpm CLI
    image: etk-migrate
    container_name: etk-migrate
    env_file: [../env/.env]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [etk]
    restart: "no"
    # ops migrations (SQL) + Payload migrations (must be generated & committed)
    command: ["sh","-lc","pnpm --filter @etk/db migrate && pnpm --filter @etk/web exec payload migrate"]

  app:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: etk-web
    container_name: etk-app
    restart: unless-stopped
    env_file: [../env/.env]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [etk]
    expose: ["3000"]
    healthcheck:
      test: ["CMD","node","-e","fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    image: etk-worker
    container_name: etk-worker
    restart: unless-stopped
    env_file: [../env/.env]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [etk]

volumes:
  caddy_data:
  caddy_config:

networks:
  etk:
    driver: bridge
