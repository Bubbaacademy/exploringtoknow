# ExploringToKnow — PRODUCTION compose (infrastructure prep).
# Phase B brings up ONLY `postgres` + `caddy`. The `app` service is defined for a
# later phase and gated behind the `app` profile so it does NOT start now.
#   docker compose --env-file ../env/.env up -d postgres caddy
name: exploringtoknow

services:
  postgres:
    image: postgres:16
    container_name: etk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ../postgres-data:/var/lib/postgresql/data
    networks: [etk]
    # not published to the host — only the app network reaches it
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    container_name: etk-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [etk]
    # Until `app` is deployed, Caddy serves TLS and returns 502 for the site.

  # ---- deployed in a LATER phase (do not start now) ----
  app:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile   # added when app deploy phase begins
    container_name: etk-app
    restart: unless-stopped
    env_file: [../env/.env]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [etk]
    expose: ["3000"]

volumes:
  caddy_data:
  caddy_config:

networks:
  etk:
    driver: bridge
